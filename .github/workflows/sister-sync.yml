# Sister Repo Sync — checks oceanpulse for changes to shared files and opens a sync PR
# Runs daily and on manual dispatch
# Requires SISTER_SYNC_TOKEN secret (a GitHub PAT with repo access to NyxSpecter4/oceanpulse)
name: Sister Repo Sync

on:
  schedule:
    - cron: '30 9 * * *'  # Daily at 9:30 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read sister sync config
        id: config
        run: |
          if [ ! -f .github/sister-sync.json ]; then
            echo "No sister-sync.json found. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Clone sister repo
        if: steps.config.outputs.skip != 'true'
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.SISTER_SYNC_TOKEN }}@github.com/NyxSpecter4/oceanpulse.git /tmp/sister

      - name: Run sync
        if: steps.config.outputs.skip != 'true'
        run: node .github/sync-sister.mjs /tmp/sister

      - name: Create sync PR if changes
        if: steps.config.outputs.skip != 'true'
        run: |
          git config user.name "sister-sync-bot"
          git config user.email "sync@oceanic.dev"
          git checkout -b sync/sister-repo-$(date +%Y%m%d)
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync."
            exit 0
          fi
          git commit -m "sync: pull shared file updates from sister repo (NyxSpecter4/oceanpulse)

          Automated sister repo sync. Files updated:
          $(git diff --cached --name-only)

          Source: NyxSpecter4/oceanpulse@$(cd /tmp/sister && git rev-parse --short HEAD)
          Generated by .github/workflows/sister-sync.yml"
          git push origin sync/sister-repo-$(date +%Y%m%d)

          # Create PR via API
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/CindyL789/Oceanic/pulls \
            -d '{
              "title": "sync: sister repo updates from oceanpulse",
              "head": "sync/sister-repo-'$(date +%Y%m%d)'",
              "base": "main",
              "body": "Automated sync from [NyxSpecter4/oceanpulse](https://github.com/NyxSpecter4/oceanpulse).\n\nReview the changes and merge if they look good. Files that need manual adaptation (JS↔TS) are flagged as issues instead.\n\n@NyxSpecter4 @CindyL789"
            }'
